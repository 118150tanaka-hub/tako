<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;color:white;font-family:sans-serif;width:100%;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:40px;overflow:hidden;}
#loading{position:fixed;top:0;left:0;width:100vw;height:100vh;background:black;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:30px;z-index:999999;opacity:1;visibility:visible;transition:opacity 1s ease,visibility 1s ease;}
#loading.hide{opacity:0;visibility:hidden;pointer-events:none;}
#loading video{width:630px;max-width:81vw;height:auto;object-fit:contain;}
.loading-text{color:white;font-size:22px;font-weight:300;letter-spacing:6px;text-transform:uppercase;opacity:1;text-shadow:0 0 12px rgba(255,255,255,.7);animation:blink 1.2s infinite;}
@keyframes blink{0%{opacity:.3;}50%{opacity:1;}100%{opacity:.3;}}
#intro{position:fixed;inset:0;background:black;display:flex;justify-content:center;align-items:center;z-index:999998;opacity:0;visibility:hidden;transition:opacity 1s ease,visibility 1s ease;}
#intro.show{opacity:1;visibility:visible;}
#intro.hide{opacity:0;visibility:hidden;pointer-events:none;}
.intro-box{text-align:center;color:white;}
.intro-box p{font-size:24px;line-height:1.8;opacity:.7;font-weight:300;}
.intro-box span{display:block;margin-top:30px;font-size:14px;letter-spacing:4px;opacity:.4;animation:blink 1.5s infinite;}
.container{width:100%;max-width:1100px;display:flex;flex-direction:column;align-items:center;gap:20px;opacity:0;visibility:hidden;pointer-events:none;transition:opacity 1s ease,visibility 1s ease;}
.container.show{opacity:1;visibility:visible;pointer-events:auto;}
.viewer{width:100%;min-height:51vh;background:#222;border-radius:16px;overflow:hidden;position:relative;box-shadow:0 10px 40px rgba(0,0,0,.5);cursor:pointer;display:flex;justify-content:center;align-items:center;}
@media(min-width:900px){
body{padding:20px;}
.container{height:calc(100vh - 40px);justify-content:center;}
.viewer{flex:1 1 auto;min-height:0;height:auto;}
}
.slide{width:100%;height:100%;display:none;align-items:center;justify-content:center;}
.slide.active{display:flex;}
.slide img{width:100%;height:100%;object-fit:contain;}

.video-wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;}
.video-wrap video{width:100%;height:100%;object-fit:contain;}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.play-btn:hover{transform:translate(-50%,-50%) scale(1.08);background:#fff;}
.play-btn.hidden{display:none;}
.play-btn svg{width:30px;height:30px;margin-left:4px;}

.controls{display:flex;align-items:center;gap:20px;}
button{padding:14px 28px;border:none;border-radius:10px;cursor:pointer;font-size:16px;background:white;color:black;transition:.2s;}
button:hover{opacity:.8;transform:translateY(-2px);}
.page{opacity:.8;font-size:15px;}
.fullscreen{position:fixed;inset:0;background:black;display:none;justify-content:center;align-items:center;z-index:9999;}
.fullscreen.active{display:flex;}
.fullscreen img{width:100%;height:100%;object-fit:contain;}
.close-btn{position:absolute;top:20px;right:20px;background:white;color:black;border:none;padding:10px 16px;border-radius:10px;cursor:pointer;z-index:10000;}
</style>
</head>
<body>

<div id="loading">
<video autoplay muted loop playsinline>
<source src="videos/mahouf10.mp4" type="video/mp4">
</video>
<div class="loading-text">Loading...</div>
</div>

<div id="intro">
<div class="intro-box">
<p>クリックで全画面表示すると<br>矢印キーで操作できます</p>
<span>Click Anywhere</span>
</div>
</div>

<div class="container" id="container">
<div class="viewer" id="viewer"></div>
<div class="page"><span id="pageNumber">1</span> / <span id="pageTotal"></span></div>
<div class="controls">
<button id="prevBtn">戻る</button>
<button id="nextBtn">進む</button>
</div>
</div>

<div class="fullscreen" id="fullscreen">
<button class="close-btn" id="closeBtn">閉じる</button>
<img id="fullscreenImage">
</div>

<script>
/* ============================================
   ★ ここだけ変更すればOK ★

   DEMO_VIDEO: 一番最初に表示する、デモリール動画のファイル名
              (videos フォルダに入れてください)

   PHOTO_COUNT: デモ動画の後に続く写真の枚数
               (images フォルダに 01.jpg, 02.jpg... の連番で入れてください)
   ============================================ */
const DEMO_VIDEO = "videos/demo.mp4";
const PHOTO_COUNT = 22;
const EXT = "jpg";
const PAD = 2;
/* ============================================ */

const viewer = document.getElementById('viewer');
const PLAY_ICON = '<svg viewBox="0 0 24 24" fill="black"><path d="M8 5v14l11-7z"/></svg>';

// --- 1ページ目: デモリール動画(再生ボタン付き) ---
const demoSlide = document.createElement('div');
demoSlide.className = 'slide active';

const videoWrap = document.createElement('div');
videoWrap.className = 'video-wrap';

const demoVideoEl = document.createElement('video');
demoVideoEl.src = DEMO_VIDEO;
demoVideoEl.playsInline = true;
demoVideoEl.setAttribute('playsinline', '');

const playBtn = document.createElement('div');
playBtn.className = 'play-btn';
playBtn.innerHTML = PLAY_ICON;

// 動画エリアのクリックは全画面表示に伝えない(再生ボタン操作を優先)
videoWrap.addEventListener('click', (e) => e.stopPropagation());
playBtn.addEventListener('click', () => {
  demoVideoEl.controls = true;
  demoVideoEl.play();
});
demoVideoEl.addEventListener('play', () => playBtn.classList.add('hidden'));
demoVideoEl.addEventListener('pause', () => playBtn.classList.remove('hidden'));
demoVideoEl.addEventListener('ended', () => playBtn.classList.remove('hidden'));

videoWrap.appendChild(demoVideoEl);
videoWrap.appendChild(playBtn);
demoSlide.appendChild(videoWrap);
viewer.appendChild(demoSlide);

// --- 2ページ目以降: 写真 ---
for (let i = 1; i <= PHOTO_COUNT; i++) {
  const num = String(i).padStart(PAD, "0");
  const slide = document.createElement('div');
  slide.className = 'slide';
  const img = document.createElement('img');
  img.src = `images/${num}.${EXT}`;
  img.loading = 'lazy';
  slide.appendChild(img);
  viewer.appendChild(slide);
}

document.getElementById('pageTotal').textContent = PHOTO_COUNT + 1;

const loading=document.getElementById("loading");
const intro=document.getElementById("intro");
const container=document.getElementById("container");
const loadingVideo=document.querySelector("#loading video");

const MIN_DISPLAY_MS=4000;
function goToIntro(){
loading.classList.add("hide");
intro.classList.add("show");
}
function startCountdownFromVideoReady(){
setTimeout(goToIntro,MIN_DISPLAY_MS);
}
if(loadingVideo.readyState>=3){
startCountdownFromVideoReady();
}else{
loadingVideo.addEventListener("canplaythrough",startCountdownFromVideoReady,{once:true});
}

intro.addEventListener("click",()=>{
intro.classList.add("hide");
container.classList.add("show");
document.body.style.overflow="auto";
});

const slides=document.querySelectorAll('.slide');
const pageNumber=document.getElementById('pageNumber');
const fullscreen=document.getElementById('fullscreen');
const fullscreenImage=document.getElementById('fullscreenImage');
let currentIndex=0;

function showSlide(index){
slides.forEach(slide=>slide.classList.remove('active'));
slides[index].classList.add('active');
pageNumber.textContent=index+1;
const currentImg = slides[index].querySelector('img');
if(fullscreen.classList.contains('active') && currentImg){
fullscreenImage.src=currentImg.src;
}
}

document.getElementById('nextBtn').addEventListener('click',()=>{
currentIndex++;
if(currentIndex>=slides.length){currentIndex=0;}
showSlide(currentIndex);
});

document.getElementById('prevBtn').addEventListener('click',()=>{
currentIndex--;
if(currentIndex<0){currentIndex=slides.length-1;}
showSlide(currentIndex);
});

// 写真ページのみクリックで全画面表示(デモ動画ページは再生ボタン操作のみ)
viewer.addEventListener('click',()=>{
const currentImg = slides[currentIndex].querySelector('img');
if(!currentImg) return;
fullscreenImage.src=currentImg.src;
fullscreen.classList.add('active');
});

document.getElementById('closeBtn').addEventListener('click',()=>{
fullscreen.classList.remove('active');
});

fullscreen.addEventListener('click',(e)=>{
if(e.target===fullscreen){fullscreen.classList.remove('active');}
});

window.addEventListener('keydown',(e)=>{
if(!fullscreen.classList.contains('active')) return;
if(e.key==='ArrowRight'){
currentIndex++;
if(currentIndex>=slides.length){currentIndex=0;}
showSlide(currentIndex);
}
if(e.key==='ArrowLeft'){
currentIndex--;
if(currentIndex<0){currentIndex=slides.length-1;}
showSlide(currentIndex);
}
if(e.key==='Escape'){
fullscreen.classList.remove('active');
}
});
</script>
</body>
</html>
